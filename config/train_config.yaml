# configs/train_config.yaml

data:
  data_dir: "C:/Users/Fedor/.cache/kagglehub/datasets/alexattia/the-simpsons-characters-dataset/versions/4/simpsons_dataset"
  img_size: 224
  batch_size: 32
  num_workers: 10 
  train_split: 0.8

model:
  name: "resnet18"
  pretrained: true
  num_classes: 42 

train:
  epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0001
  device: "cuda"
  seed: 42

artifacts:
  save_dir: "./artifacts"
  project_name: "simpsons-classification"